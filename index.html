<!DOCTYPE html>
<html lang="en">
<head>
    <title>Dashboard | FruitAI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="overlay"></div>

    <nav>
        <h3>FruitAI <span style="color: var(--accent);">Dashboard</span></h3>
        <a href="/logout" class="btn btn-outline">Sign Out</a>
    </nav>

    <div class="container" style="text-align: center; margin-top: 5vh;">
     <div style="
    background: rgba(0, 0, 0, 0.85); /* Slightly darker for better contrast */
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    
    /* REDUCED SIZE HERE */
    padding: 1.5rem 2rem;       /* Less padding (Height) */
    max-width: 550px;           /* Less width */
    
    border-radius: 16px; 
    border: 1px solid rgba(255, 255, 255, 0.15); 
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    display: inline-block; 
    margin-bottom: 2rem;">

    <h1 style="
        font-size: 2.2rem;      /* Smaller Font */
        margin-bottom: 0.5rem; 
        color: white; 
        text-shadow: 0 2px 5px rgba(0,0,0,0.5);">
        Analyze Fruit Freshness
    </h1>

    <p style="
        color: #cbd5e1; 
        font-size: 1rem;        /* Smaller Font */
        margin-bottom: 0;">
        Upload fruit images to classify freshness & shelf life.
    </p>

</div>

        <form action="/predict" method="post" enctype="multipart/form-data">
            <div class="upload-zone">
                <div style="font-size: 4rem; margin-bottom: 1rem;">📂</div>
                <h3>Drag & Drop Images Here</h3>
                <input type="file" name="images" multiple required style="position:absolute; top:0; left:0; width:100%; height:100%; opacity:0; cursor:pointer;">
            </div>
            <button type="submit" class="btn" style="margin-top: 2rem; padding: 15px 50px;">🚀 Start Analysis</button>
        </form>
    </div>
</body>
</html>
